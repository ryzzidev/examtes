<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  
  <!-- Manifest Inline (Data URL) -->
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiU3VtYXRpZiBTQVMgU01QTjEzIEtlbmRhcmkiLCJzaG9ydF9uYW1lIjoiU3VtYXRpZiBTQVMiLCJkZXNjcmlwdGlvbiI6IlN1bWF0aWYgQWtoaXIgU2VtZXN0ZXIgR2FuamlsIiwic3RhcnRfdXJsIjoiLi8iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjZmZmZmZmIiwidGhlbWVfY29sb3IiOiIjMWU0MGFmIiwib3JpZW50YXRpb24iOiJwb3J0cmFpdCIsImljb25zIjpbeyJzcmMiOiJodHRwczovL2lpbGkuaW8vZnpkMU1hMi5wbmciLCJzaXplcyI6IjE5MngxOTIiLCJ0eXBlIjoiaW1hZ2UvcG5nIn0seyJzcmMiOiJodHRwczovL2lpbGkuaW8vZnpkMU1hMi5wbmciLCJzaXplcyI6IjUxMng1MTIiLCJ0eXBlIjoiaW1hZ2UvcG5nIn1dfQ==" />

  <title>Sumatif Akhir Semester Ganjil</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1e40af;
      --green: #008e8a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 30px;
      color: #1e293b;
    }

    .logo {
      width: 145px;
      margin-bottom: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .main-title {
      font-size: 21px;
      font-weight: 600;
      color: var(--primary);
      text-align: center;
      margin-bottom: 6px;
    }

    .year-title {
      font-size: 17px;
      font-weight: 400;
      color: #475569;
      text-align: center;
      margin-bottom: 45px;
    }

    .input-token {
      width: 90%;
      max-width: 380px;
      padding: 16px 20px;
      text-transform: uppercase;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      border: 3px solid #00b4ae;
      border-radius: 25px;
      outline: none;
      margin-bottom: 30px;
    }
    .input-token:focus {
      box-shadow: 0 0 0 6px rgba(0, 180, 174, 0.25);
    }

    .btn {
      width: 75%;
      max-width: 380px;
      padding: 16px;
      background: var(--green);
      color: white;
      font-size: 17px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 142, 138, 0.35);
    }

    .info {
      font-size: 15px;
      color: #64748b;
      text-align: center;
      line-height: 1.6;
      margin: 30px 0 40px;
    }

    .foot {
      font-size: 12px;
      color: #64748b;
      text-align: center;
      margin-top: auto;
      padding-top: 30px;
    }

    /* Loading */
    #loading {
      position: fixed; inset: 0; background: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; font-size: 19px; font-weight: 600; color: var(--primary);
    }
    .spinner {
      width: 55px; height: 55px; border: 6px solid #e2e8f0; border-top: 6px solid var(--primary);
      border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; z-index: 9999;
    }
    .modal-content {
      background: white; padding: 35px 25px; border-radius: 24px;
      text-align: center; max-width: 340px; width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      border: 4px solid #ef4444;
    }
    .close-btn {
      margin-top: 20px; padding: 13px 40px; background: #ef4444;
      color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div>Loading Database Token...</div>
    <div class="spinner"></div>
  </div>

  <img src="https://iili.io/fzd1Ma2.png" alt="Logo" class="logo">
  <div class="main-title">Sumatif Akhir Semester Ganjil</div>
  <div class="year-title">Tahun Pelajaran 2025/2026</div>

  <input type="text" id="kodeInput" class="input-token" placeholder="MASUKKAN TOKEN SOAL" maxlength="50" autocomplete="off">

  <div class="info">
    Silahkan masukkan Token Soal sesuai arahan<br>dari Panitia / Pengawas
  </div>

  <button class="btn" onclick="verifikasiKode()">CEK TOKEN & MULAI</button>

  <div class="foot">
    S-Code by : Baso Asril<br>
    <small>PWA Ready - Bisa di Install</small>
  </div>

  <!-- Modal Error -->
  <div id="errorModal" class="modal">
    <div class="modal-content">
      <h2>Token Tidak Valid!</h2>
      <p>Token yang Anda masukkan kosong atau tidak terdaftar.</p>
      <button class="close-btn" onclick="closeModal()">TUTUP</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxI-ZZZPwXvQm1KNU7YqRR6sUOdhGftcz4kY5rc2rhJKFQ4s2KRUXAJeLZgZrQxYc2F/exec';
    let daftarKode = {};

    async function loadDaftarKode() {
      try {
        const response = await fetch(API_URL + '?t=' + Date.now());
        daftarKode = await response.json();
      } catch (err) {
        console.error(err);
        alert('Gagal memuat database token. Cek koneksi internet.');
      } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('kodeInput').focus();
      }
    }

    loadDaftarKode();

    function verifikasiKode() {
      const input = document.getElementById('kodeInput').value.trim().toUpperCase();
      if (!input) {
        document.getElementById('errorModal').style.display = 'flex';
        return;
      }

      const url = daftarKode[input];
      if (url) {
        document.body.style.transition = 'opacity 0.6s';
        document.body.style.opacity = '0';
        setTimeout(() => window.location.href = url, 600);
      } else {
        document.getElementById('errorModal').style.display = 'flex';
      }
    }

    function closeModal() {
      document.getElementById('errorModal').style.display = 'none';
      document.getElementById('kodeInput').focus();
    }

    // Enter key support
    document.getElementById('kodeInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifikasiKode();
    });

    // Service Worker Inline (Penting untuk Install)
    if ('serviceWorker' in navigator) {
      const swCode = `
        self.addEventListener('install', () => self.skipWaiting());
        self.addEventListener('activate', () => self.clients.claim());
      `;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(console.log);
    }

    // Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      deferredPrompt = e;
      console.log('%cAplikasi siap di-install', 'color:green;font-weight:bold');
    });
  </script>
</body>
</html>
